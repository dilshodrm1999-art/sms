name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Prepare APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/AmirTemur-BuyukYurishlar.apk
          ls -la dist

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AmirTemur-BuyukYurishlar-APK
          path: dist/AmirTemur-BuyukYurishlar.apk
          if-no-files-found: error

      - name: Publish to Release (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Amir Temur: Buyuk Yurishlar — so'nggi APK"
          files: dist/AmirTemur-BuyukYurishlar.apk
          body: |
            Tayyor o'rnatiladigan APK (debug imzo bilan).
            Telefoningizga yuklab oling va "Noma'lum manbalardan o'rnatish"ga ruxsat bering.
            Build raqami: ${{ github.run_number }}
