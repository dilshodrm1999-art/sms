name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Prepare APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/AmirTemur-BuyukYurishlar-v4.0.apk
          ls -la dist

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AmirTemur-BuyukYurishlar-APK
          path: dist/AmirTemur-BuyukYurishlar-v4.0.apk
          if-no-files-found: error

      - name: Publish to Release (v4.0)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v4.0
          name: "Amir Temur: Buyuk Yurishlar — v4.0"
          files: dist/AmirTemur-BuyukYurishlar-v4.0.apk
          body: |
            v4.0 — yangiliklar:
            • 2.5D (pseudo-3D) jang maydoni: perspektiv yer, chuqurlik, soyalar, soyali ikonalar
            • Real vaqtli jang (~13 soniya): ekranni bosib kamondan o'q uzasiz, 2 soniya qayta o'qlash
            • Shaharlararo yurish: 1 daqiqalik (60s) teskari sanoq + tarixiy yil/ma'lumot
            • Yaxshilangan unit ikonalari va strategiya, maxsus effekt-saundlar

            Tayyor o'rnatiladigan APK (debug imzo). "Noma'lum manbalardan o'rnatish"ga ruxsat bering.
            Build raqami: ${{ github.run_number }}
