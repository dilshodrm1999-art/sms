name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Prepare APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/AmirTemur-BuyukYurishlar-v3.0.apk
          ls -la dist

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AmirTemur-BuyukYurishlar-APK
          path: dist/AmirTemur-BuyukYurishlar-v3.0.apk
          if-no-files-found: error

      - name: Publish to Release (v3.0)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.0
          name: "Amir Temur: Buyuk Yurishlar — v3.0"
          files: dist/AmirTemur-BuyukYurishlar-v3.0.apk
          body: |
            v3.0 — yangiliklar:
            • Bosqichli (round) taktik jang: har bosqichda taktika tanlaysiz, janglar uzoqroq va strategikroq
            • Ta'sirli yakuniy sahna: imperiya bosqichma-bosqich yorishadi, maxsus ovozlar
            • Yangi maxsus effekt-saundlar (karnay, o'q yog'dirish, gong, g'alaba fanfarasi)
            • Ixtiyoriy rasm yuklash: drawable ichiga temur.png qo'ysangiz avtomatik ishlatiladi

            Tayyor o'rnatiladigan APK (debug imzo). "Noma'lum manbalardan o'rnatish"ga ruxsat bering.
            Build raqami: ${{ github.run_number }}
