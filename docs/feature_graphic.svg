<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="500" viewBox="0 0 1024 500">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="80%">
      <stop offset="0%" stop-color="#15110A"/>
      <stop offset="100%" stop-color="#0D0B07"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E6C04A"/>
      <stop offset="100%" stop-color="#C9A227"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- decorative mountains -->
  <path d="M0,360 L150,300 L300,360 L470,290 L640,360 L820,310 L1024,360 L1024,500 L0,500 Z" fill="#241608"/>

  <!-- emblem ring -->
  <g transform="translate(170,230)">
    <circle r="120" fill="none" stroke="#5A4516" stroke-width="6"/>
    <circle r="104" fill="none" stroke="#C9A227" stroke-width="3"/>
    <!-- crown -->
    <path d="M-78,-12 L-44,-78 L-22,-28 L0,-86 L22,-28 L44,-78 L78,-12 Z" fill="url(#gold)"/>
    <rect x="-78" y="-14" width="156" height="26" fill="url(#gold)"/>
    <circle cx="0" cy="-2" r="10" fill="#9C2B1B"/>
    <!-- sword -->
    <path d="M-10,28 L10,28 L10,100 L0,120 L-10,100 Z" fill="#EDE3C2"/>
    <rect x="-40" y="22" width="80" height="11" fill="#C9A227"/>
  </g>

  <!-- title -->
  <text x="360" y="210" font-family="Georgia, 'Times New Roman', serif" font-size="78" font-weight="bold" fill="#E6C04A">AMIR TEMUR</text>
  <text x="362" y="280" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="bold" fill="#C9A227">BUYUK YURISHLAR</text>
  <text x="364" y="330" font-family="Georgia, serif" font-size="26" fill="#B8A06A">2D Tarixiy Strategiya  •  To'liq o'zbekcha  •  Offline</text>
</svg>
